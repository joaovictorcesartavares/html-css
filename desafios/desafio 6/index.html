<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>TAGS EM HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>

    <ul type="square">
       <li title="Use a tag &lt;p&gt;">Parágrafo</li>
       <li title="Use as tags de &lt;h1&gt; a &lt;h6&gt;">Títulos</li>
       <li title="Use &lt;img&gt;">Imagens</li>
       <li title="Use &lt;abbr&gt;">Abreviações</li>
       <li title="Use &lt;code&gt;">Códigos-fonte</li>
       <li title="Use &lt;ol&gt; e &lt;li&gt;">Listas numeradas</li>
       <li title="Use &lt;ul&gt; e &lt;li&gt;">Listas com demarcadores</li>
    </ul>
</body>
</html>
