<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>

<body>
    <h1>Imagem Dinâmica</h1>
    <p>A proporção da imagem muda com o tamanho da tela!</p>

    <picture>
        <source media="(max-width:750px)" srcset="img/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="img/foto-m.png" type="image/png">
        <img src="img/foto-g.png" alt="Imagem Flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <audio preload="metadata" controls autoplay loop>
        <source src="midia/turningslowly-ugonnaonyekwe.mp3" type="audio/mpeg">
        <source src="midia/turningslowly-ugonnaonyekwe.ogg" type="audio/ogg">
        <source src="midia/turningslowly-ugonnaonyekwe.wav" type="audio/wav">
        <p>Seu navegador não suporta áudio, se quiser baixa aqui:
            <a href="midia/turningslowly-ugonnaonyekwe.mp3" download="turningslowly-ugonnaonyekwe.mp3" type="audio/mpeg">MP3</a>
        </p>
    </audio>
</body>

</html>
