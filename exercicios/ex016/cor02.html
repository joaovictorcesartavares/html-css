<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * {
            /* Configurações globais das CSS*/
            height: 100%;
        }

        body {
            background: linear-gradient(to top, #F20587, #F205E2, #960CF2, #F29F05, #F24607);
            background-attachment: fixed;
        }



        .titulo-pag {
            text-align: center;
            color: whitesmoke;
        }
    </style>
</head>

<body>
    <div class="titulo-pag">
        <h1>Testando cores em gradiente</h1>
    </div>
</body>

</html>
